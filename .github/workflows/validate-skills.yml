name: Validate skills

on:
  pull_request:
    paths:
      - "skills/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/validate-skills.yml"
  push:
    paths:
      - "skills/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/validate-skills.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate skills
        run: bun run lint
